<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>用户登录 - 账号管理系统</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            background: rgba(255,255,255,0.95);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 420px;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }
        .container::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 5px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }
        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            color: #999;
            transition: all 0.3s;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
        }
        .tab.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
        .tab:hover { color: #667eea; }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-size: 14px;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 14px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 4px rgba(102,126,234,0.1);
        }
        .form-group .icon {
            position: absolute;
            right: 15px;
            top: 42px;
            color: #999;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 14px;
        }
        .remember {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            cursor: pointer;
        }
        .remember input[type="checkbox"] {
            width: 18px; height: 18px;
            accent-color: #667eea;
            cursor: pointer;
        }
        .forgot {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }
        .forgot:hover { text-decoration: underline; }

        .btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 15px rgba(102,126,234,0.4);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102,126,234,0.5);
        }
        .btn:active { transform: translateY(0); }

        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            border-left: 4px solid #c62828;
        }
        .success-msg {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
            border-left: 4px solid #2e7d32;
        }

        .hidden { display: none !important; }

        .logo {
            text-align: center;
            margin-bottom: 10px;
        }
        .logo svg {
            width: 60px; height: 60px;
        }
        .title {
            text-align: center;
            color: #333;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #999;
            font-size: 14px;
            margin-bottom: 25px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="#667eea" stroke-width="2">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
        </div>
        <div class="title">账号管理系统</div>
        <div class="subtitle">安全 · 高效 · 便捷</div>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">登录</div>
            <div class="tab" onclick="switchTab('register')">注册</div>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label>账号 / 用户名</label>
                <input type="text" id="loginUsername" placeholder="请输入账号" required>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="loginPassword" placeholder="请输入密码" required>
            </div>
            <div class="remember-forgot">
                <label class="remember">
                    <input type="checkbox" id="rememberMe">
                    <span>保存账号密码</span>
                </label>
                <a href="#" class="forgot" onclick="alert('请联系管理员重置密码')">忘记密码?</a>
            </div>
            <button type="submit" class="btn">登 录</button>
        </form>

        <!-- 注册表单 -->
        <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" id="regUsername" placeholder="设置用户名" required minlength="3" maxlength="20">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" id="regPassword" placeholder="设置密码（至少6位）" required minlength="6">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" id="regConfirm" placeholder="再次输入密码" required>
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" id="regEmail" placeholder="输入邮箱地址" required>
            </div>
            <button type="submit" class="btn">注 册</button>
        </form>
    </div>

    <script>
        // 读取保存的账号密码
        window.onload = function() {
            const saved = localStorage.getItem('savedCredentials');
            if (saved) {
                try {
                    const creds = JSON.parse(saved);
                    document.getElementById('loginUsername').value = creds.username || '';
                    document.getElementById('loginPassword').value = creds.password || '';
                    document.getElementById('rememberMe').checked = true;
                } catch(e) {}
            }
        };

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            }
            hideMsgs();
        }

        function showError(msg) {
            const el = document.getElementById('errorMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('successMsg').style.display = 'none';
        }
        function showSuccess(msg) {
            const el = document.getElementById('successMsg');
            el.textContent = msg;
            el.style.display = 'block';
            document.getElementById('errorMsg').style.display = 'none';
        }
        function hideMsgs() {
            document.getElementById('errorMsg').style.display = 'none';
            document.getElementById('successMsg').style.display = 'none';
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            const remember = document.getElementById('rememberMe').checked;

            try {
                const res = await fetch('api.php?action=login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                const data = await res.json();

                if (data.success) {
                    // 保存/清除账号密码
                    if (remember) {
                        localStorage.setItem('savedCredentials', JSON.stringify({username, password}));
                    } else {
                        localStorage.removeItem('savedCredentials');
                    }
                    // 保存会话
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    showSuccess('登录成功，正在跳转...');
                    setTimeout(() => {
                        window.location.href = data.user.role === 'admin' ? 'admin.php' : 'index.php';
                    }, 800);
                } else {
                    showError(data.message || '登录失败');
                }
            } catch(err) {
                showError('网络错误，请稍后重试');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirm = document.getElementById('regConfirm').value;
            const email = document.getElementById('regEmail').value.trim();

            if (password !== confirm) {
                showError('两次输入的密码不一致');
                return;
            }

            try {
                const res = await fetch('api.php?action=register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password, email})
                });
                const data = await res.json();

                if (data.success) {
                    showSuccess('注册成功！请登录');
                    setTimeout(() => switchTab('login'), 1500);
                } else {
                    showError(data.message || '注册失败');
                }
            } catch(err) {
                showError('网络错误，请稍后重试');
            }
        }
    </script>
</body>
</html>
